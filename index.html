<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>IPrime - Оставить отзыв</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #8C8C8C;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        /* Слой с узором — без поворота, но с чёткими отступами */
        .pattern-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('logo.png');
            background-repeat: repeat;
            background-size: 200px 200px;  /* ← логотип 150px + отступ 50px (1/3) */
            opacity: 0.2;
            filter: blur(2px);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .main-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .main-logo {
            max-width: 220px;
            width: auto;
            height: auto;
            margin-bottom: 12px;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.2));
            object-fit: contain;
        }

        .main-subtitle {
            color: white;
            font-size: 15px;
            font-weight: 500;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        .shop-card {
            border-radius: 28px;
            overflow: hidden;
            margin-bottom: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .sovetskaya-bg {
            background-image: url('sovetskaya-bg.jpg');
            background-size: cover;
            background-position: center;
        }

        .agapkina-bg {
            background-image: url('agapkina-bg.jpg');
            background-size: cover;
            background-position: center;
        }

        .shop-overlay {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(2px);
            padding: 24px 20px;
        }

        .shop-address {
            font-size: 20px;
            font-weight: 600;
            color: white;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            width: 100%;
            padding: 14px 20px;
            margin-bottom: 12px;
            border: none;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            color: white;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(2px);
        }

        .btn:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.25);
        }

        .btn-icon {
            width: 32px;
            height: 32px;
            object-fit: contain;
            filter: drop-shadow(0 1px 1px rgba(0,0,0,0.2));
        }

        .btn-text {
            flex: 1;
            text-align: left;
            font-weight: 600;
        }

        .btn-icon-right {
            font-size: 18px;
            opacity: 0.8;
        }

        @media (max-width: 480px) {
            .shop-overlay { padding: 18px 16px; }
            .main-logo { max-width: 160px; }
            .shop-address { font-size: 18px; }
            .btn { padding: 12px 16px; font-size: 14px; }
            .btn-icon { width: 26px; height: 26px; }
        }
    </style>
</head>
<body>
    <div class="pattern-layer"></div>

    <div class="container">
        <div class="main-header">
            <img src="logo.png" alt="IPrime" class="main-logo">
            <div class="main-subtitle">Нам важно ваше мнение<br>Выберите магазин и площадку</div>
        </div>

        <div class="shop-card sovetskaya-bg">
            <div class="shop-overlay">
                <div class="shop-address">📍 ул. Советская, 163А</div>
                <a href="https://yandex.ru/maps/org/iprime/131307417081/reviews/?add-review=true" class="btn" target="_blank">
                    <img src="yandex-maps-logo.png" class="btn-icon" alt="Яндекс">
                    <span class="btn-text">Яндекс Карты</span>
                    <span class="btn-icon-right">➡️</span>
                </a>
                <a href="https://2gis.ru/tambov/firm/70000001057612429/tab/reviews/addreview" class="btn" target="_blank">
                    <img src="2gis-icon-logo.png" class="btn-icon" alt="2ГИС">
                    <span class="btn-text">2ГИС</span>
                    <span class="btn-icon-right">➡️</span>
                </a>
                <a href="https://www.google.ru/maps/place/iPrime/@52.7398846,41.4519658,17z/data=!4m8!3m7!1s0x4139151e0d8266b3:0x6af6ad4b6ec2242b!8m2!3d52.7398846!4d41.4519658!9m1!1b1!16s%2Fg%2F11pz00yvjg?entry=ttu" class="btn" target="_blank">
                    <img src="google-maps-sign-logo.png" class="btn-icon" alt="Google">
                    <span class="btn-text">Google Карты</span>
                    <span class="btn-icon-right">➡️</span>
                </a>
                <a href="https://vk.com/iprimetmb?w=community-review-211859691" class="btn" target="_blank">
                    <img src="vk-logo.png" class="btn-icon" alt="ВК">
                    <span class="btn-text">ВКонтакте</span>
                    <span class="btn-icon-right">➡️</span>
                </a>
            </div>
        </div>

        <div class="shop-card agapkina-bg">
            <div class="shop-overlay">
                <div class="shop-address">📍 ул. Агапкина, 7</div>
                <a href="https://yandex.ru/maps/org/iprime/66331588878/reviews/?add-review=true" class="btn" target="_blank">
                    <img src="yandex-maps-logo.png" class="btn-icon" alt="Яндекс">
                    <span class="btn-text">Яндекс Карты</span>
                    <span class="btn-icon-right">➡️</span>
                </a>
                <a href="https://2gis.ru/tambov/branches/70000001057612428/firm/70000001104659652/tab/reviews" class="btn" target="_blank">
                    <img src="2gis-icon-logo.png" class="btn-icon" alt="2ГИС">
                    <span class="btn-text">2ГИС</span>
                    <span class="btn-icon-right">➡️</span>
                </a>
                <a href="https://vk.com/iprimetmb?w=community-review-211859691" class="btn" target="_blank">
                    <img src="vk-logo.png" class="btn-icon" alt="ВК">
                    <span class="btn-text">ВКонтакте</span>
                    <span class="btn-icon-right">➡️</span>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
